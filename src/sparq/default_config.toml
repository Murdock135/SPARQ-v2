test_query = "What are the main factors contributing to salmonella rates in Missouri in a statistical sense?"

[paths]
output_dir = "~/tmp/sparq_v2"
# output_stem = ""  # optional stem, e.g. "run" → "run_<timestamp>"
prompts_dir = "prompts"

[llm_config]

[llm_config.router]
model = "gemini-2.0-flash"
provider = "google_genai"

[llm_config.planner]
model = "gemini-2.0-flash"
provider = "google_genai"

[llm_config.researcher]
model = "gemini-2.0-flash"
provider = "google_genai"
recursion_limit = 100

[llm_config.critic]
model = "gemini-2.0-flash"
provider = "google_genai"

[llm_config.synthesizer]
model = "gemini-2.0-flash"
provider = "google_genai"

[llm_config.vision]
# Must be a multimodal model.  Used by interpret_plot tool.
model = "gemini-2.0-flash"
provider = "google_genai"

[llm_config.judge]
# Used by eval harness (judge.py, batch.py, ablation.py).
model = "gemini-2.0-flash"
provider = "google_genai"
